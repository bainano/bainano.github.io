收系统声音可视化</title><style>.audio-visualizer-container {
      width: 800px;
      height: 200px;
      position: relative;
    }

 .audio-bar {
      width: 10px;
      background-color: #8B0000; /* 深红色 */
      position: absolute;
      bottom: 0;
    }</style></head><body><div class="audio-visualizer-container" id="visualizer"></div><script>function startAudioVisualization() {
      if ('getUserMedia' in navigator.mediaDevices) {
        navigator.mediaDevices.getDisplayMedia({ audio: true })
      .then(stream => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            source.connect(analyser);

            setInterval(() => {
              const bufferLength = analyser.frequencyBinCount;
              const dataArray = new Uint8Array(bufferLength);

              analyser.getByteFrequencyData(dataArray);

              visualizer.innerHTML = '';
              for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i];
                const bar = document.createElement('div');
                bar.classList.add('audio-bar');
                bar.style.height = barHeight + 'px';
                bar.style.left = i * 10 + 'px';
                visualizer.appendChild(bar);
              }
            }, 20);
          })
      .catch(err => {
            console.error('获取系统声音出错: ', err);
        });
      } else {
        console.error('浏览器不支持获取音频的功能。');
      }
    }

    startAudioVisualization();</script></body></html></div></div></div></main><footer class="footer"><div class="wrapper"><nav class="footer__nav"><ul></ul></nav><div class="footer__copyright"><p>© 2024 BAINANO Powered by Publii</p></div><button onclick="backToTopFunction()" id="backToTop" class="footer__bttop" aria-label="回到顶部" title="回到顶部"><svg width="20" height="20"><use xlink:href="https://bainano.github.io/assets/svg/svg-map.svg#toparrow"/></svg></button></div></footer><script defer="defer" src="https://bainano.github.io/assets/js/scripts.min.js?v=ffcbea6c02c8178d10092962b235a5b0"></script><script>window.publiiThemeMenuConfig={mobileMenuMode:'sidebar',animationSpeed:300,submenuWidth: 'auto',doubleClickTime:500,mobileMenuExpandableSubmenus:true,relatedContainerForOverlayMenuSelector:'.top'};</script><script>var images = document.querySelectorAll('img[loading]');
